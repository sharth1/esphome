---
esphome:
  name: esp32-xiao-c3
  friendly_name: ESP32 XIAO C3
  on_boot:
    - script.execute: measure_soil_moisture

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_pwd
  fast_connect: true
  power_save_mode: light

  ap:
    ssid: "esp32-xiao-c3-fallback"
    password: "fallback123"

api:
  port: 6053

ota:
  - platform: esphome

mdns:
  disabled: false

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_pwd
  port: !secret mqtt_port
  topic_prefix: esp/xiao_c3
  birth_message:
    topic: esp/xiao_c3
    payload: online
  will_message:
    topic: esp/xiao_c3
    payload: wtf

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 3s

############################# SCRIPTS #############################
script:
  - id: measure_soil_moisture
    then:
      - switch.turn_on: vcc_soil_moisture
      - delay: 10s
      - if:
          condition:
            mqtt.connected:
          then: 
          - component.update: soil_moisture_raw
          - delay: 5s # delay to ensure data has time to be sent
          - logger.log: Soil Moisture raw value sent to database

          else:
          - logger.log: Failed sending to database
      - deep_sleep.enter: deep_sleep_1
#       - component.update: soil_percent
      - switch.turn_off: vcc_soil_moisture
  # - id: pump_water
  # - id: measure_water_level
  # - id: indicate_low_water_level
  # - id: indicate_pumping


