---
esphome:
  name: esp32-xiao-c3
  friendly_name: ESP32 XIAO C3
  on_boot:
    - script.execute: check_connections
    - script.execute: initiate_sensors
    - script.execute: measure_water_level
    - script.execute: measure_soil_moisture
    - script.execute: measure_temp
    - script.execute: measure_hum


esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_pwd
  fast_connect: true
  power_save_mode: light

  ap:
    ssid: "esp32-xiao-c3-fallback"
    password: "fallback123"

api:
  port: 6053

ota:
  - platform: esphome

mdns:
  disabled: false

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_pwd
  port: !secret mqtt_port
  topic_prefix: esp/xiao_c3

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 3s

############################# SCRIPTS #############################
script:
  - id: check_connections
    then:
### Check connections ###
      - wait_until:
          condition:
            wifi.connected:
          timeout: 10s
      # check wifi connection
      - if:
          condition:
            wifi.connected:
          then: 
            - logger.log: 
                level: INFO
                format: CONNECTED wifi 
      - if:
          condition:
            not: 
              wifi.connected:
          then: 
            - logger.log:
                level: WARN
                format: COULD NOT CONNECT wifi 
            - deep_sleep.enter: deep_sleep_1

      # check mqtt connection
      - wait_until:
          condition:
            mqtt.connected:
          timeout: 10s
      - if:
          condition:
            mqtt.connected:
          then: 
            - logger.log: 
                level: INFO
                format: CONNECTED mqtt 
      - if:
          condition:
            not: 
              mqtt.connected:
          then: 
            - logger.log:
                level: WARN
                format: COULD NOT CONNECT mqtt 
            - deep_sleep.enter: deep_sleep_1


  - id: initiate_sensors
    if: 
      condition:  
        and:
          - wifi.connected:
          - mqtt.connected:
            then: 
            - switch.turn_on: vcc_waterlevel 
            - logger.log:
                level: INFO
                format: INITIATED Water Level Sensor 

            - switch.turn_on: vcc_soil_moisture 
            - logger.log:
                level: INFO
                format: INITIATED Soil Moisture Sensor 

            - switch.turn_on: vcc_temp_hum
            - logger.log:
                level: INFO
                format: INITIATED Temperature and Humidity Sensor   

            - delay: 1s # make it 30 seconds for final version!!!!!!!!!!!!!

# alle sensoren anschalten
# wasserlevel checken
# wenn zu gering in HA ALARM
# moisture checken
# temperatur checken
# moisture value wirklich bestimmen
# pumpen/skippen
# ggf. LED einschalten



  - id: measure_water_level
    then:
      - component.update: waterlevel_raw
      - switch.turn_off: vcc_waterlevel
      # log water level
  
  - id: measure_soil_moisture
    then: 
      - component.update: soil_moisture_raw
      # log mositure level
      - logger.log:
          level: INFO
          format: 
      # not turning the sensor off yet becaus eim not sure if the value will be kept for calcs

  - id: measure_temp
    then:
      - component.update: temp # how do i access only temp value
      # log temp
      # not turning the sensor off yet becaus eim not sure if the value will be kept for calcs

  - id: measure_hum
    then:
      - component.update: hum # how do i access only hum value 
      # log hum
      # not turning the sensor off yet becaus eim not sure if the value will be kept for calcs

  - id: calculate_moisture_value
  # lo calc
      # tbd
  
  - id: pump_cycle
    then: 
      - switch.turn_on: vcc_led
      - logger.log:
          level: INFO
          format: STARTING pump cycle
      - switch.turn_on: relay1
      - delay: pump_duration
      - switch.turn_off: relay1
      - logger.log: 
          level: INFO
          format: STOPPING pump cycle
      - switch.turn_off: vcc_led


  # - id: pump_water
  # - id: indicate_low_water_level
  # - id: indicate_pumping


