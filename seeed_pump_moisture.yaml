############################# SENSORS #############################

sensor:
  - name: "Soil Moisture"
    id: soil_moisture_raw
    pin: GPIO3
    platform: adc
    raw: true
    unit_of_measurement: "mV"
    attenuation: 12db
    update_interval: never

  - name: "Water Level"
    id: water_level_raw
    pin: GPIO4
    platform: adc
    raw: true
    unit_of_measurement: "mV"
    attenuation: 12db
    update_interval: never

  - id: temp_hum
    pin: GPIO6
    platform: dht
    model: dht11
    temperature:
      name: "Temperature"
      id: temperature
    humidity:
      name: "Humidity"
      id: humidity
    update_interval: never



