############################# SWITCHES #############################

switch:
  # Relay
  - name: "Relay_1"
    id: relay1
    platform: gpio
    pin: 
      number: 5
      inverted: true
    restore_mode: ALWAYS_OFF

  - name: "Soil Moisture Power"
    id: vcc_soil_moisture
    platform: gpio
    pin: GPIO2
    
  - name: "Water Level Power"
    id: vcc_waterlevel
    platform: gpio
    pin: GPIO1

  - name: "Tem./Hum. Power"
    id: vcc_temp_hum
    platform: gpio
    pin: GPIO0

  - name: "Pump ON LED"
    id: vcc_led
    platform: gpio
    pin: GPIO9

############################# NUMBERS #############################

# Example configuration entry
number:
  - name: "Dry Soil Value"
    id: dry_soil_value
    platform: template
    optimistic: true
    min_value: 0
    max_value: 3650
    step: 1
    restore_value: true

  - name: "Wet Soil Value"
    id: wet_soil_value
    platform: template
    optimistic: true
    min_value: 0
    max_value: 2000
    step: 1
    restore_value: true

  - name: "Low Water Level Value"
    id: low_water_level_value
    platform: template
    optimistic: true
    min_value: 0
    max_value: 2000
    step: 1
    restore_value: true

  - name: "High Water Level Value"
    id: high_water_level_value
    platform: template
    optimistic: true
    min_value: 0
    max_value: 2000
    step: 1
    restore_value: true

  - name: "Pump Duration"
    id: pump_duration
    platform: template
    optimistic: true
    min_value: 0
    max_value: 2000
    step: 1
    restore_value: true

  - name: "Deep Sleep Duration"
    id: deep_sleep_time
    platform: template
    optimistic: true
    restore_value: true



