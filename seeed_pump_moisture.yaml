---
esphome:
  name: esp32-xiao-c3
  friendly_name: ESP32 XIAO C3
  on_boot:
    then:

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_pwd
  fast_connect: true
  power_save_mode: light

  ap:
    ssid: "esp32-xiao-c3-fallback"
    password: "fallback123"

api:

ota:
  - platform: esphome

mdns:
  disabled: false

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_pwd
  port: !secret mqtt_port
  topic_prefix: esp/xiao_c3

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 1800s

script_measurement:
  - id: do_measurement
    then:
      - delay: 15s
      - component.update: soil_raw
      - component.update: soil_percent
      - delay: 2s
      - deep_sleep.enter: deep_sleep_1

script_pump:
  - id: pump
    then:
      - switch.turn_off: relay1
      - delay: 5s
      - switch.turn_on: relay1


