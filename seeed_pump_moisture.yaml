---
esphome:
  name: esp32-xiao-c3
  friendly_name: ESP32 XIAO C32
  on_boot:
    # - priority: 700
      then:
        - output.turn_on: my_slow_pwm
        - delay: 5s
        - output.set_level: 
            id: my_slow_pwm
            level: "50%"
        - script.execute: check_connections
        - script.wait: check_connections
    # - priority: 600
    #   then:
        - script.execute: initiate_sensors
        - script.wait: initiate_sensors
    # - priority: 500
    #   then:
        - script.execute: measure_water_level
        - script.wait: measure_water_level

        - script.execute: measure_soil_moisture
        - script.wait: measure_soil_moisture

        - script.execute: measure_temp_hum
        - script.wait: measure_temp_hum

        - if:
            condition:
              - lambda: |-
                 return id(soil_moisture_raw).state > id(wet_soil_value).state;
            then:
              - script.execute: pump_cycle
              - script.wait: pump_cycle
        
        - switch.turn_off: vcc_led
        - output.turn_off: my_slow_pwm
        - deep_sleep.enter: deep_sleep_1

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

logger: 
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_pwd
  fast_connect: true
  power_save_mode: light

  ap:
    ssid: "esp32-xiao-c3-fallback"
    password: "fallback123"

api:
  port: 6053

ota:
  - platform: esphome

mdns:
  disabled: false

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_pwd
  port: !secret mqtt_port
  topic_prefix: esp/xiao_c3

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 3600s

############################# SCRIPTS #############################
script:
  - id: check_connections
    then:
### Check connections ###
      - wait_until:
          condition:
            wifi.connected:
          timeout: 10s
      # check wifi connection
      - if:
          condition:
            wifi.connected:
          then: 
            - logger.log: 
                level: INFO
                format: CONNECTED wifi 
      - if:
          condition:
            not: 
              wifi.connected:
          then: 
            - logger.log:
                level: WARN
                format: COULD NOT CONNECT wifi 
            - deep_sleep.enter: deep_sleep_1

      # check mqtt connection
      - wait_until:
          condition:
            mqtt.connected:
          timeout: 10s
      - if:
          condition:
            mqtt.connected:
          then: 
            - logger.log: 
                level: INFO
                format: CONNECTED mqtt 
      - if:
          condition:
            not: 
              mqtt.connected:
          then: 
            - logger.log:
                level: WARN
                format: COULD NOT CONNECT mqtt 
            - deep_sleep.enter: deep_sleep_1


  - id: initiate_sensors
    then:
      if: 
        all:  
          - wifi.connected:
          - mqtt.connected:
        then: 
        - switch.turn_on: vcc_waterlevel 
        - logger.log:
            level: INFO
            format: INITIATED Water Level Sensor 

        - switch.turn_on: vcc_soil_moisture 
        - logger.log:
            level: INFO
            format: INITIATED Soil Moisture Sensor 

        - switch.turn_on: vcc_temp_hum
        - logger.log:
            level: INFO
            format: INITIATED Temperature and Humidity Sensor   

        - delay: 10s 
  
        else:
          - logger.log:
              level: WARN
              format: Skipped initiation of sensors, because MQTT/WIFI NOT CONNECTED

  - id: measure_water_level
    then:
      - component.update: water_level_raw
      - delay: 5s
      - logger.log:
          level: INFO
          format: Water Level value updated
      - switch.turn_off: vcc_waterlevel
      # log water level
  
  - id: measure_soil_moisture
    then: 
      - component.update: soil_moisture_raw
      - delay: 5s
      - logger.log:
          level: INFO
          format: "Soil Moisture value updated: %.1f mV"
          args: ["id(soil_moisture_raw).state"]
      - switch.turn_off: vcc_soil_moisture

  - id: measure_temp_hum
    then:
      - component.update: temp_hum 
      - delay: 5s
      - logger.log:
          level: INFO
          format: "Temp./Hum. value updated: %.1f °C / %.1f %%" 
          args:
            - id(temperature).state
            - id(humidity).state
      - switch.turn_off: vcc_temp_hum
  # - id: calculate_moisture_value
  # lo calc
      # tbd
  
  - id: pump_cycle
    then: 
      - switch.turn_on: vcc_led
      - logger.log:
          level: INFO
          format: STARTING pump cycle
      - switch.turn_on: relay1
      - delay: !lambda return id(pump_duration).state * 1000;
      - switch.turn_off: relay1
      - logger.log: 
          level: INFO
          format: STOPPING pump cycle
      - switch.turn_off: vcc_led


output:
  platform: slow_pwm
  pin: GPIO9
  id: my_slow_pwm
  period: 500ms
