############################# SENSORS #############################

sensor:
  - name: "Soil Moisture Raw"
    id: soil_moisture_raw
    pin: GPIO3
    platform: adc
    raw: true
    attenuation: 12db
    update_interval: never

  - name: "Water Level"
    id: waterlevel_raw
    pin: GPIO4
    platform: adc
    raw: true
    attenuation: 12db
    update_interval: never

  - id: temp_hum
    pin: GPIO6
    platform: dht
    temperature:
      name: "Temperature"
    humidity:
      name: "Humidity"
    update_interval: never



