#       if (value < 0) return 0;
#       if (value > 100) return 100;
#       return value;

############################# SWITCHES #############################

switch:
  # Relay
  - name: "Relay_2"
    id: relay2
    platform: gpio
    pin: 
      number: 6
      inverted: true
    restore_mode: ALWAYS_OFF

  - name: "Soil Moisture Power"
    id: vcc_soil_moisture
    platform: gpio
    pin: GPIO0

############################# NUMBERS #############################

# Example configuration entry
number:
  - name: "Dry Soil Value"
    id: dry_soil_value
    platform: template
    optimistic: true
    min_value: 0
    max_value: 3650
    step: 1
    restore_value: true

  - name: "Wet Soil Value"
    id: wet_soil_value
    platform: template
    optimistic: true
    min_value: 0
    max_value: 2000
    step: 1
    restore_value: true

  - name: "Low Water Level Value"
    id: low_water_level_value
    platform: template
    optimistic: true
    min_value: 0
    max_value: 2000
    step: 1
    restore_value: true

  - name: "High Water Level Value"
    id: high_water_level_value
    platform: template
    optimistic: true
    min_value: 0
    max_value: 2000
    step: 1
    restore_value: true

  - name: "Pump Duration"
    id: pump_duration
    platform: template
    optimistic: true
    min_value: 0
    max_value: 2000
    step: 1
    restore_value: true




