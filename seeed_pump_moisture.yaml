############################# SENSORS #############################

sensor:
  - name: "Soil Moisture Raw"
    id: soil_moisture_raw
    pin: GPIO3
    platform: adc
    raw: true
    attenuation: 12db
    update_interval: never


#   - platform: template
#     id: soil_percent
