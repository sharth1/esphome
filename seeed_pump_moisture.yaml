sensor:
  - pin: 
    platform: adc
    id: soil_raw
    name: ""
    raw: true
    attenuation: 12db
    update_interval: never


  - platform: template
    id: soil_percent
    name: ""
    unit_of_measurement: "%"
    lambda: |-
      const float dry = 2500;   // trocken kalibrieren!
      const float wet = 1460;   // nass kalibrieren!
      float value = (dry - id(soil_raw).state) * 100.0 / (dry - wet);
      if (value < 0) return 0;
      if (value > 100) return 100;
      return value;

switch:
  # Relay
  - platform: gpio
    name: "relay2"
    pin: 
      number: !
      inverted: false
    id: relay2
    restore_mode: ALWAYS_OFF
    # turn_on_action:
    #   - led.turn_on: blinker
    # turn_off_action:
    #   - led.turn_off: blinker

led:
  - platform: gpio
    name: "led_water_level"
    pin: !
    id: "led_water_level"
    restore_mode: ALWAYS_OFF
    optimistic: ! yes 
    inverted: true

  - platform: ! template
    name: "led_blinker"
    id: "blinker"
    turn_on_action:
        lambda: 'return id(relay2).state;'
        condition:
          lambda: 'return true;'
        then:
        - led.turn_on: led_water_level
        - delay: 10ms 
        - led.turn_off: led_water_level
        - delay: 500ms
    turn_off_action:
    - led.turn_off: led_water_level
...
